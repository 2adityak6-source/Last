    <title>होली धमाका 2026 - कलर स्मोक स्पेशल</title>
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Arial', sans-serif;
            background-color: #fff;
            transition: background-color 1.5s ease;
            overflow: hidden; touch-action: manipulation;
        }

        /* कलर स्मोक एनीमेशन */
        .smoke {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            animation: smokeMove 8s infinite alternate;
        }

        @keyframes smokeMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            50% { transform: translate(100px, 50px) scale(1.5); opacity: 0.6; }
            100% { transform: translate(-50px, 100px) scale(1.2); opacity: 0.4; }
        }

        /* पिचकारी और गुलाल */
        .item { position: absolute; font-size: 55px; z-index: 10; filter: drop-shadow(3px 3px 8px rgba(0,0,0,0.2)); user-select: none; }
        .p1 { top: 5%; left: 5%; transform: rotate(-15deg); }
        .p2 { bottom: 5%; right: 5%; transform: rotate(165deg); }
        .g1 { bottom: 8%; left: 8%; }
        .g2 { top: 8%; right: 8%; }

        .card {
            position: relative; z-index: 20;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px 20px; border-radius: 25px;
            text-align: center; width: 85%; max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border: 6px solid #ff007f;
        }

        h1 { font-size: 3rem; margin: 10px 0; color: #d81b60; text-shadow: 2px 2px #ffd700; }
        .wish { font-size: 1.1rem; color: #333; font-weight: bold; margin-bottom: 20px; }

        input {
            width: 85%; padding: 12px; border: 2px solid #ff007f;
            border-radius: 50px; margin-bottom: 15px; text-align: center; font-size: 1rem;
        }

        .btn-create { background: #ff007f; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; display: none; align-items: center; justify-content: center; text-decoration: none; }

        .paint { position: absolute; border-radius: 50%; pointer-events: none; z-index: 5; animation: splash 0.7s ease-out forwards; }
        @keyframes splash { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
        
        .music-note { position: fixed; top: 10px; right: 10px; z-index: 100; cursor: pointer; font-size: 30px; background: white; border-radius: 50%; padding: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }

<body>

    <div class="music-note" onclick="toggleMusic()">🎵</div>

    <audio id="holiSong" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div id="smoke-container"></div>

    <div class="item p1">🔫</div>
    <div class="item p2">🔫</div>
    <div class="item g1">🥣</div>
    <div class="item g2">🥣</div>

    <div class="card">
        <h2 id="fromDisplay">नमस्ते!</h2>
        <h1>Happy Holi!</h1>
        <p class="wish">"पिचकारी की धार, गुलाल की बौछार, मुबारक हो आपको होली का त्योहार!"</p>

        <input type="text" id="userName" placeholder="अपना नाम लिखें">
        <button class="btn-create" onclick="createHoliLink()"> लिंक तैयार करे </button>
        <a id="whatsappBtn" class="btn-whatsapp" href="#" target="_blank"> WhatsApp पर भेजें ➔</a>
        <div id="linkStatus" style="font-size: 0.8rem; margin-top: 10px; color: #d81b60;"></div>
    </div>

    <script>
        const bgColors = ['#FFF5F8', '#F0FDFF', '#FFFDF0', '#F3E5F5', '#E8F5E9', '#FFF3E0'];
        const paintColors = ['#FF007F', '#FFD700', '#00E5FF', '#39FF14', '#FF4500', '#9C27B0'];
        const song = document.getElementById('holiSong');

        // कलर स्मोक बनाना
        function initSmoke() {
            const container = document.getElementById('smoke-container');
            for (let i = 0; i < 6; i++) {
                const smoke = document.createElement('div');
                smoke.className = 'smoke';
                smoke.style.width = Math.random() * 300 + 200 + 'px';
                smoke.style.height = smoke.style.width;
                smoke.style.backgroundColor = paintColors[Math.floor(Math.random() * paintColors.length)];
                smoke.style.left = Math.random() * 100 + '%';
                smoke.style.top = Math.random() * 100 + '%';
                smoke.style.animationDelay = i * 1.5 + 's';
                container.appendChild(smoke);
            }
        }
        initSmoke();

        const params = new URLSearchParams(window.location.search);
        const naam = params.get('n');
        if (naam) {
            document.getElementById('fromDisplay').innerText = decodeURIComponent(naam) + " की ओर से आपको...";
        }

        function toggleMusic() {
            if (song.paused) song.play();
            else song.pause();
        }

        window.addEventListener('mousedown', (e) => {
            if (song.paused) song.play();
            changeEverything(e.clientX, e.clientY);
        });

        function changeEverything(x, y) {
            document.body.style.backgroundColor = bgColors[Math.floor(Math.random() * bgColors.length)];
            for(let i=0; i<4; i++) {
                const p = document.createElement('div');
                p.className = 'paint';
                const size = Math.random() * 100 + 50 + 'px';
                p.style.width = size; p.style.height = size;
                p.style.left = (x + (Math.random()-0.5)*100) - parseFloat(size)/2 + 'px';
                p.style.top = (y + (Math.random()-0.5)*100) - parseFloat(size)/2 + 'px';
                p.style.backgroundColor = paintColors[Math.floor(Math.random() * paintColors.length)];
                p.style.borderRadius = `${Math.random()*40+20}% ${Math.random()*40+20}%`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }
        }

        function createHoliLink() {
            const name = document.getElementById('userName').value;
            if(!name) { alert("कृपया नाम लिखें!"); return; }
            song.play();

            const finalLink = window.location.origin + window.location.pathname + "?n=" + encodeURIComponent(name);
            const whatsappMsg = `*${name}* ने आपके लिए एक स्पेशल होली सरप्राइज भेजा है! 🎨🎶%0Aदेखने के लिए यहाँ क्लिक करें 👇%0A${finalLink}`;
            
            const btn = document.getElementById('whatsappBtn');
            btn.href = "https://api.whatsapp.com/send?text=" + whatsappMsg;
            btn.style.display = "flex";
            
            document.getElementById('linkStatus').innerText = "लिंक और म्यूजिक तैयार है!";
            changeEverything(window.innerWidth/2, window.innerHeight/2);
        }

        setInterval(() => {
            document.body.style.backgroundColor = bgColors[Math.floor(Math.random() * bgColors.length)];
        }, 4000);
    </script>
